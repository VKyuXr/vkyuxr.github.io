<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

        <title>vkyuxr's blog</title>
        
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
        <link rel="stylesheet" href="css/page-style.css">
        <link rel="stylesheet" href="css/markdown-style.css">

        <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    </head>
    <body>
        <header>
            <div class="global-nav" id="globalNav">
                <div class="nav-logo">
                    <h1 style="font-family: 'Times New Roman', Times, serif;">REVERSE</h1>
                    <p style="font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif; font-size: 1.2rem;">vkyuxr's blog</p>
                </div>
                <div class="nav-menu" id="navMenu">
                    <a href="#" class="nav-link">首页</a>
                    <a href="#" class="nav-link">待定页面1</a>
                    <a href="#" class="nav-link">待定页面2</a>
                    <a href="#" class="nav-link" id="navBackTo3D">回到封面</a>
                </div>
            </div>
        </header>

        <div id="canvas-container">

        <div id="article-modal">
            <div class="modal-header">
                <div id="modal-title">正在加载文章标题...</div>
                <div class="close-btn" onclick="closeArticle()">✕</div>
            </div>
            <div id="modal-content">正在加载文章内容...</div>
        </div>

        <div id="article-overlay"></div>

        <div class="blog-list-view" id="blogListView">
            <div class="container">
                <div class="profile-card">
                    <div class="avatar">VK</div>
                    <div class="profile-info">
                        <h1>VKyuXr</h1>
                        <p class="bio">闲人 · 闲人</p>
                        <div class="social-links">
                            <a href="https://github.com/VKyuXr" target="_blank" rel="noopener noreferrer">GitHub</a>
                        </div>
                    </div>
                </div>

                <h2 class="section-title">置顶文章</h2>
                <div class="blog-grid" id="blogGrid"></div>

                <h2 class="section-title">文章列表</h2>
                <div class="blog-list" id="blogList"></div>
                
                <footer>
                    <nav class="footer-nav">
                        <a href="#">首页</a>
                        <a href="#">待定页面1</a>
                        <a href="#">待定页面2</a>
                    </nav>
                </footer>
            </div>
        </div>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
        
        <script type="module" src="js/blog-loader.js"></script>
        <script type= module src="js/blog-render.js"></script>
    </body>
</html>
