<!-- index.html -->
<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
        <title>vkyuxr's blog</title>
        
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap">
        <link rel="stylesheet" href="css/page-style.css">
        <link rel="stylesheet" href="css/markdown-style.css">
        <link rel="stylesheet" href="css/cursor-style.css">

        <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    </head>
    <body>
        <div id="cursor-dot"></div>
        <svg id="cursor-ring" viewBox="0 0 50 50">
            <g class="triangles">
                <path d="M25 1 L46 37 L4 37 Z" class="triangle-1" stroke-linejoin="miter"/>
                <path d="M25 49 L46 13 L4 13 Z" class="triangle-2" stroke-linejoin="miter"/>
            </g>
        </svg>

        <div id="backgroundCanvas"></div>
        <div class="body-blur-overlay"></div>

        <header>
            <div id="globalBar" class="global-bar">
                <div class="bar-logo">
                    <h1>REVERSE</h1>
                    <p>vkyuxr's blog</p>
                </div>
                <div id="barMenu" class="bar-menu">
                    <a href="#" class="bar-link hover-trigger">首页</a>
                    <a href="#" class="bar-link hover-trigger" id="navBackTo3D">回到封面</a>
                </div>
            </div>
        </header>

        <div id="articleModal">
            <div id="modalTitle" class="modal-header">正在加载文章标题...</div>
            <div id="modalContent">正在加载文章内容...</div>
        </div>

        <div id="articleOverlay"></div>

        <div id="blogMainView" class="blog-main-view">
            <div class="container">
                <div class="profile-card">
                    <div class="avatar">VKX</div>
                    <div class="profile-info">
                        <h1>VKyuXr</h1>
                        <p class="bio">闲人</p>
                        <div class="social-links">
                            <a href="https://github.com/VKyuXr" target="_blank" rel="noopener noreferrer" class="hover-trigger">GitHub</a>
                        </div>
                    </div>
                </div>

                <!-- <h2 class="section-title">置顶文章</h2> -->
                <h2 class="section-title">
                    <span class="text-zh">置顶文章</span>
                    <span class="text-en">Pinned Article</span>
                </h2>
                <div class="blog-grid" id="blogGrid"></div>

                <!-- <h2 class="section-title">文章列表</h2> -->
                <h2 class="section-title">
                    <span class="text-zh">文章列表</span>
                    <span class="text-en">Article List</span>
                </h2>
                <div class="blog-list" id="blogList"></div>
                
                <footer>
                    <nav class="footer-nav">
                        <a href="#" class="hover-trigger">首页</a>
                    </nav>
                </footer>
            </div>
        </div>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
        
        <script type="module" src="js/blog-loader.js"></script>
        <script type="module" src="js/blog-render.js"></script>
        <script type="module" src="js/blog-cursor.js"></script>
    </body>
</html>
